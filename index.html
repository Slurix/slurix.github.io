<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Thoughts - My Personal Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .blog-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-post-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .add-post-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .posts-container {
            display: grid;
            gap: 20px;
        }

        .post {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .post:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .post-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .post-date {
            color: #888;
            font-size: 0.9rem;
            background: #f8f9fa;
            padding: 5px 12px;
            border-radius: 20px;
        }

        .post-content {
            color: #555;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .post-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .post-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .action-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #f8f9fa;
            border-color: #667eea;
            color: #667eea;
        }

        .delete-btn {
            color: #dc3545;
            border-color: #dc3545;
        }

        .delete-btn:hover {
            background: #dc3545;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 1px solid #ddd;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: #666;
        }



        .social-links {
            margin: 20px 0;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 20px;
            border: 2px solid #667eea;
            border-radius: 25px;
            transition: all 0.3s ease;
            background: rgba(102, 126, 234, 0.1);
        }

        .social-link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .social-link svg {
            transition: transform 0.3s ease;
        }

        .social-link:hover svg {
            transform: scale(1.1);
        }

        .scroll-pepe {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 80px;
            height: 80px;
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .scroll-pepe.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .pepe-character {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            border-radius: 50% 50% 45% 45%;
            position: relative;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .pepe-character::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 25px 0 0 white;
        }

        .pepe-character::after {
            content: '';
            position: absolute;
            top: 18px;
            left: 18px;
            width: 6px;
            height: 6px;
            background: black;
            border-radius: 50%;
            box-shadow: 25px 0 0 black;
        }

        .pepe-mouth {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 15px;
            background: #ff69b4;
            border-radius: 0 0 15px 15px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            header {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .blog-stats {
                flex-direction: column;
                gap: 15px;
            }
            
            .post-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .modal-content {
                padding: 30px 20px;
                margin: 20px;
                width: calc(100% - 40px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Weekly Thoughts</h1>
            <p class="subtitle">My personal journey through ideas, reflections, and discoveries</p>
            <div class="social-links">
                <a href="https://x.com/slurix_xyz" target="_blank" class="social-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                    </svg>
                    Follow @slurix_xyz
                </a>
            </div>
            <div class="blog-stats">
                <div class="stat">
                    <div class="stat-number" id="post-count">0</div>
                    <div class="stat-label">Posts</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="word-count">0</div>
                    <div class="stat-label">Words</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="week-count">0</div>
                    <div class="stat-label">Weeks</div>
                </div>
            </div>

        </header>

        <div class="posts-container" id="posts-container">
            <div class="empty-state">
                <h3>No thoughts yet!</h3>
                <p>Click "Add New Thought" to start sharing your weekly reflections.</p>
            </div>
        </div>
    </div>

    <!-- Floating Pepe Character -->
    <div class="scroll-pepe" id="scroll-pepe">
        <div class="pepe-character">
            <div class="pepe-mouth"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="post-modal">
        <div class="modal-content">
            <h2>Share Your Thoughts</h2>
            <form id="post-form">
                <div class="form-group">
                    <label for="post-title">Title</label>
                    <input type="text" id="post-title" placeholder="What's on your mind this week?" required>
                </div>
                <div class="form-group">
                    <label for="post-content">Your Thoughts</label>
                    <textarea id="post-content" placeholder="Share your reflections, discoveries, or insights..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="post-tags">Tags (comma-separated)</label>
                    <input type="text" id="post-tags" placeholder="reflection, learning, life, thoughts">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Publish Thought</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let posts = [];
        let editingIndex = -1;

        // Load posts from memory on page load
        function loadPosts() {
            const savedPosts = posts; // In real implementation, this would load from a file
            if (savedPosts && savedPosts.length > 0) {
                posts = savedPosts;
                renderPosts();
                updateStats();
            }
        }

        // Save posts to memory
        function savePosts() {
            // In a real GitHub Pages setup, you'd need to manually update a JSON file
            // For now, this just keeps posts in memory during the session
        }

        // Open modal
        function openModal(index = -1) {
            editingIndex = index;
            const modal = document.getElementById('post-modal');
            const form = document.getElementById('post-form');
            
            if (index >= 0) {
                const post = posts[index];
                document.getElementById('post-title').value = post.title;
                document.getElementById('post-content').value = post.content;
                document.getElementById('post-tags').value = post.tags.join(', ');
                document.querySelector('.modal h2').textContent = 'Edit Your Thoughts';
                document.querySelector('.btn-primary').textContent = 'Update Thought';
            } else {
                form.reset();
                document.querySelector('.modal h2').textContent = 'Share Your Thoughts';
                document.querySelector('.btn-primary').textContent = 'Publish Thought';
            }
            
            modal.style.display = 'block';
        }

        // Close modal
        function closeModal() {
            document.getElementById('post-modal').style.display = 'none';
            editingIndex = -1;
        }

        // Handle form submission
        document.getElementById('post-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();
            const tagsInput = document.getElementById('post-tags').value.trim();
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            
            if (!title || !content) return;
            
            const post = {
                id: editingIndex >= 0 ? posts[editingIndex].id : Date.now(),
                title,
                content,
                tags,
                date: editingIndex >= 0 ? posts[editingIndex].date : new Date().toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                }),
                wordCount: content.split(/\s+/).length
            };
            
            if (editingIndex >= 0) {
                posts[editingIndex] = post;
            } else {
                posts.unshift(post);
            }
            
            savePosts();
            renderPosts();
            updateStats();
            closeModal();
            
            // Show success animation
            const btn = document.querySelector('.add-post-btn');
            btn.textContent = '✅ Published!';
            setTimeout(() => {
                btn.textContent = '✨ Add New Thought';
            }, 2000);
        });

        // Render posts
        function renderPosts() {
            const container = document.getElementById('posts-container');
            
            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No thoughts yet!</h3>
                        <p>Click "Add New Thought" to start sharing your weekly reflections.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = posts.map((post, index) => `
                <article class="post">
                    <div class="post-header">
                        <h2 class="post-title">${post.title}</h2>
                        <span class="post-date">${post.date}</span>
                    </div>
                    <div class="post-content">${post.content.replace(/\n/g, '<br>')}</div>
                    ${post.tags.length > 0 ? `
                        <div class="post-tags">
                            ${post.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    ` : ''}

                </article>
            `).join('');
        }

        // Delete post
        function deletePost(index) {
            if (confirm('Are you sure you want to delete this thought?')) {
                posts.splice(index, 1);
                savePosts();
                renderPosts();
                updateStats();
            }
        }

        // Update statistics
        function updateStats() {
            const postCount = posts.length;
            const wordCount = posts.reduce((total, post) => total + post.wordCount, 0);
            const weekCount = Math.ceil(postCount); // Assuming one post per week
            
            document.getElementById('post-count').textContent = postCount;
            document.getElementById('word-count').textContent = wordCount.toLocaleString();
            document.getElementById('week-count').textContent = weekCount;
        }

        // Close modal when clicking outside
        window.addEventListener('click', function(e) {
            const modal = document.getElementById('post-modal');
            if (e.target === modal) {
                closeModal();
            }
        });

        // Initialize
        loadPosts();
        updateStats();

        // Scroll Pepe functionality
        window.addEventListener('scroll', function() {
            const scrollPepe = document.getElementById('scroll-pepe');
            const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > 200) {
                scrollPepe.classList.add('visible');
            } else {
                scrollPepe.classList.remove('visible');
            }
        });

        // Add some sample posts for demonstration
        if (posts.length === 0) {
            posts = [
                {
                    id: 5,
                    title: "The Art of Digital Minimalism",
                    content: "This week I decided to declutter my digital life. Unsubscribed from 47 newsletters, deleted 12 apps I never use, and organized my desktop for the first time in months. There's something liberating about digital spaces that breathe. It's funny how we accumulate digital clutter just like physical clutter - slowly, unconsciously, until one day you realize your phone has become a maze of forgotten downloads and your email is drowning in promotional noise. The cleanup felt like meditation.",
                    tags: ["minimalism", "productivity", "digital-wellness"],
                    date: "June 18, 2025",
                    wordCount: 89
                },
                {
                    id: 4,
                    title: "Late Night Coding Sessions",
                    content: "There's magic in coding after midnight. The world quiets down, distractions fade, and suddenly complex problems become solvable puzzles. Tonight I finally cracked that algorithm I've been wrestling with for days. It wasn't about being smarter or trying harder - it was about having the mental space to think clearly. Sometimes the best solutions come when you stop forcing them and let your mind wander through the code like exploring a familiar neighborhood at night.",
                    tags: ["coding", "productivity", "night-thoughts"],
                    date: "June 11, 2025",
                    wordCount: 78
                },
                {
                    id: 3,
                    title: "Coffee Shop Philosophy",
                    content: "Spent three hours in a local coffee shop today, just watching people. Everyone has their ritual - the businessman checking emails frantically, the student with textbooks spread like battle plans, the writer staring at a blank screen. We're all just trying to make sense of our little corner of chaos. The barista knows everyone's order by heart, creating these tiny moments of human connection in our increasingly digital world. Sometimes the most profound thoughts come from simply observing life unfold around you.",
                    tags: ["observations", "philosophy", "human-nature"],
                    date: "June 4, 2025",
                    wordCount: 85
                },
                {
                    id: 2,
                    title: "The Weight of Small Decisions",
                    content: "Realized today that most of life isn't shaped by the big dramatic moments we expect - it's built from thousands of tiny choices. What to eat for breakfast, whether to scroll social media or read a book, taking the stairs instead of the elevator. These micro-decisions compound like interest, slowly steering the ship of your life in directions you didn't consciously choose. It's both terrifying and empowering to realize how much control we actually have, hidden in the mundane moments we usually ignore.",
                    tags: ["decision-making", "life-philosophy", "self-awareness"],
                    date: "May 28, 2025",
                    wordCount: 92
                },
                {
                    id: 1,
                    title: "Welcome to My Weekly Thoughts",
                    content: "Starting this blog to capture my weekly reflections, learnings, and random thoughts. I believe there's value in taking time each week to pause and reflect on what's been on my mind. This space will be my digital journal - raw, honest, and hopefully helpful to others who might relate to these musings. Here's to the journey of turning fleeting thoughts into lasting words.",
                    tags: ["introduction", "reflection", "blogging"],
                    date: "May 21, 2025",
                    wordCount: 65
                }
            ];
            renderPosts();
            updateStats();
        }
    </script>
</body>
</html>
